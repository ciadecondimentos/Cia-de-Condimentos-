<!DOCTYPE html>
<html>
<head>
  <title>Teste de Imagem</title>
  <style>
    body { margin: 20px; font-family: Arial; }
    h1 { color: #C0392B; }
    img { border: 1px solid #ccc; margin: 20px 0; max-width: 300px; }
    .info { background: #f0f0f0; padding: 10px; border-radius: 8px; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>🧪 Teste de Carregamento de Imagens</h1>
  
  <div class="info">
    <strong>APIDatabase:</strong> Produto "produto teste" tem imagem em `/api/uploads/1773807856968-718701598.png`
  </div>

  <h2>Teste 1: SVG direto</h2>
  <img src="/api/uploads/1773807856968-718701598.png" alt="Teste SVG" />

  <h2>Teste 2: Via fetch</h2>
  <div id="result-fetch"></div>

  <h2>Teste 3: Chamada API /products</h2>
  <div id="result-api"></div>

  <script>
    // Teste fetch
    fetch('/api/uploads/1773807856968-718701598.png')
      .then(r => document.getElementById('result-fetch').innerHTML = `Status: ${r.status}, OK: ${r.ok}`)
      .catch(e => document.getElementById('result-fetch').innerHTML = `❌ Erro: ${e.message}`);

    // Teste API
    fetch('/api/products')
      .then(r => r.json())
      .then(data => {
        console.log('API Response:', data);
        const firstProduct = Array.isArray(data) ? data[0] : data[0] || data;
        document.getElementById('result-api').innerHTML = `
          <strong>Produto:</strong> ${firstProduct?.name}<br>
          <strong>Imagens:</strong> ${firstProduct?.images?.length || 0}<br>
          <strong>Primeira imagem:</strong> ${firstProduct?.images?.[0] || 'Sem imagem'}<br>
          ${firstProduct?.images?.[0] ? `<img src="${firstProduct.images[0]}" alt="Produto" />` : ''}
        `;
      })
      .catch(e => document.getElementById('result-api').innerHTML = `❌ Erro: ${e.message}`);
  </script>
</body>
</html>
