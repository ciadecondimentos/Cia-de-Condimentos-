<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Images - Debug</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .test-section { border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; border-radius: 5px; }
    h2 { color: #333; }
    pre { background: #f4f4f4; padding: 10px; border-radius: 3px; overflow-x: auto; }
    .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
    .product-card { border: 1px solid #ddd; padding: 10px; border-radius: 5px; }
    .product-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 3px; margin-bottom: 10px; }
    .error { color: #d00; }
    .success { color: #0a0; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>
  <h1>🧪 Teste de Imagens de Produtos</h1>
  
  <div class="test-section">
    <h2>1. Teste da API - GET /api/products</h2>
    <button onclick="testAPI()">Testar API</button>
    <pre id="apiResult">Aguardando teste...</pre>
  </div>

  <div class="test-section">
    <h2>2. Renderização das Imagens</h2>
    <div id="imageGrid" class="image-grid"></div>
  </div>

  <div class="test-section">
    <h2>3. Diagnóstico</h2>
    <div id="diagnostics"></div>
  </div>

  <script>
    const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:3000/api'
      : 'https://cia-de-condimentos.onrender.com/api';

    console.log('API URL:', API_URL);

    async function testAPI() {
      const resultDiv = document.getElementById('apiResult');
      resultDiv.textContent = 'Testando...';
      
      try {
        const response = await fetch(API_URL + '/products');
        console.log('Response status:', response.status);
        console.log('Response ok:', response.ok);
        
        const data = await response.json();
        console.log('Response data:', data);
        
        resultDiv.textContent = JSON.stringify(data, null, 2);
        
        // Run diagnostics
        runDiagnostics(data);
        
        // Render images
        renderImages(data);
        
      } catch (error) {
        console.error('Error:', error);
        resultDiv.textContent = `<span class="error">Erro ao chamar API: ${error.message}</span>`;
        
        const diagDiv = document.getElementById('diagnostics');
        diagDiv.innerHTML = `
          <h3 class="error">❌ Erro na Conexão</h3>
          <p>${error.message}</p>
          <p>Verifique se:</p>
          <ul>
            <li>Servidor backend está rodando em <code>${API_URL}</code></li>
            <li>DATABASE_URL está configurado corretamente em <code>.env</code></li>
            <li>As migrations foram executadas</li>
          </ul>
        `;
      }
    }

    function runDiagnostics(products) {
      const diagDiv = document.getElementById('diagnostics');
      let html = '<h3>📊 Análise dos Dados</h3>';
      
      if (!products || products.length === 0) {
        html += '<p class="error">❌ Nenhum produto retornado pela API</p>';
        diagDiv.innerHTML = html;
        return;
      }
      
      html += `<p class="success">✅ ${products.length} produtos encontrados</p>`;
      
      let productsWithImages = 0;
      let productsWithoutImages = 0;
      let imagesTotal = 0;
      
      products.forEach((p, idx) => {
        const hasImages = p.images && p.images.length > 0;
        const imageCount = p.images ? p.images.length : 0;
        
        if (hasImages) {
          productsWithImages++;
          imagesTotal += imageCount;
        } else {
          productsWithoutImages++;
        }
        
        console.log(`Produto ${idx}: ${p.name} - ${imageCount} imagens`, p);
      });
      
      html += `<h4>Resumo:</h4>`;
      html += `<ul>
        <li>Produtos com imagens: <strong class="success">${productsWithImages}</strong></li>
        <li>Produtos sem imagens: <strong class="error">${productsWithoutImages}</strong></li>
        <li>Total de imagens: <strong>${imagesTotal}</strong></li>
      </ul>`;
      
      if (productsWithoutImages > 0) {
        html += `<p class="error">⚠️ ${productsWithoutImages} produto(s) sem imagens. Verifique se foram salvas no banco de dados.</p>`;
      }
      
      if (productsWithImages === 0) {
        html += `<p class="error">❌ NENHUM PRODUTO COM IMAGENS!</p>`;
        html += `<p>Ações:</p>
        <ol>
          <li>Ir para Admin Panel (/admin.html)</li>
          <li>Adicionar novo produto com imagem</li>
          <li>Voltar aqui e clicar "Testar API" novamente</li>
        </ol>`;
      }
      
      diagDiv.innerHTML = html;
    }

    function renderImages(products) {
      const gridDiv = document.getElementById('imageGrid');
      
      if (!products || products.length === 0) {
        gridDiv.innerHTML = '<p>Sem produtos</p>';
        return;
      }
      
      gridDiv.innerHTML = products.map((p, idx) => {
        const hasImages = p.images && p.images.length > 0;
        const firstImage = hasImages ? p.images[0] : null;
        const imageUrl = firstImage || p.image;
        
        const imgHtml = imageUrl
          ? `<img src="${imageUrl}" alt="${p.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" style="width:100%; height:150px; object-fit: cover; border-radius: 3px;">
             <div style="display:none; width:100%; height:150px; background: #f0e8d0; display: flex; align-items: center; justify-content: center; font-size: 40px; border-radius: 3px;">🌶️</div>`
          : `<div style="width:100%; height:150px; background: #f0e8d0; display: flex; align-items: center; justify-content: center; font-size: 40px; border-radius: 3px;">🌶️</div>`;
        
        return `
          <div class="product-card">
            ${imgHtml}
            <strong>${p.name}</strong>
            <p>${p.category || 'Sem categoria'}</p>
            <p>Preço: R$ ${p.price}</p>
            <small>Imagens: ${p.images ? p.images.length : 0}</small>
            ${p.images && p.images.length > 0 ? `<br><small>URLs: ${p.images.map(u => u.substring(u.lastIndexOf('/') + 1)).join(', ')}</small>` : ''}
          </div>
        `;
      }).join('');
    }

    // Auto-test on load
    window.addEventListener('load', testAPI);
  </script>
</body>
</html>
